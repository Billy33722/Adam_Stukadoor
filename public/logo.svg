<svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stukad'Or">
  <!-- STUK bold text -->
  <text
    x="14"
    y="138"
    font-family="Impact, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="118"
    fill="#111111"
    letter-spacing="-3"
  >STUK</text>

  <!-- Trowel handle -->
  <line x1="440" y1="14" x2="380" y2="70" stroke="#111111" stroke-width="15" stroke-linecap="round"/>
  <!-- Handle grip cap -->
  <ellipse cx="444" cy="10" rx="9" ry="8" fill="#111111"/>

  <!-- Trowel blade (kite/pointing trowel shape) -->
  <path d="M 300,60 L 380,40 L 405,128 L 318,150 Z" fill="#111111"/>

  <!-- Dark grey swoosh / plaster stroke -->
  <path
    d="M 108,158
       C 148,136 244,126 334,136
       C 398,144 462,164 470,183
       C 452,202 416,212 370,210
       C 294,204 168,194 108,183
       C 76,177 79,165 108,158 Z"
    fill="#5c5c5c"
  />

  <!-- d'Or text on swoosh -->
  <text
    x="298"
    y="197"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="37"
    fill="#ffffff"
  >d'Or</text>
</svg>
